{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login|EduVision</title>

<link rel="icon" href="{% static 'accounts/images/logo.jpg' %}">

<style>

/* ---------- GLOBAL ---------- */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #021024, #052659, #5483B3);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* ---------- WRAPPER ---------- */
.auth-wrapper {
    width: 90%;
    max-width: 900px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    border-radius: 20px;
    overflow: hidden;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(18px);
    box-shadow: 0 25px 60px rgba(0,0,0,0.4);
    animation: fadeIn 0.8s ease;
}

/* ---------- LEFT PANEL ---------- */
.auth-left {
    background: linear-gradient(135deg, #2563eb, #3b82f6);
    color: white;
    padding: 50px;
    text-align: center;
}

.auth-left img {
    width: 80px;
    margin-bottom: 15px;
}

.auth-left h1 {
    font-size: 34px;
    margin: 10px 0;
}

.auth-left p {
    opacity: 0.85;
    font-size: 16px;
}

/* ---------- RIGHT PANEL ---------- */
.auth-right {
    background: linear-gradient(to bottom, white, #e6f2ff);
    padding: 50px;
}

.auth-right h2 {
    color: #052659;
    margin-bottom: 25px;
}

/* ---------- INPUT ---------- */
.input-group {
    margin-bottom: 18px;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 14px;
    transition: 0.3s;
}

input:focus {
    border-color: #2563eb;
    box-shadow: 0 0 10px rgba(37,99,235,0.2);
    outline: none;
}

/* ---------- BUTTON ---------- */
button {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    color: white;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(37,99,235,0.3);
}

/* ---------- ERROR ---------- */
.error-msg {
    margin-top: 10px;
    color: #dc2626;
    font-size: 14px;
    background: #fee2e2;
    padding: 8px;
    border-radius: 8px;
    text-align: center;
}

/* ---------- FOOTER ---------- */
.footer {
    text-align: center;
    margin-top: 15px;
    font-size: 12px;
    color: #666;
}

/* ---------- ANIMATION ---------- */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
}

/* ---------- RESPONSIVE ---------- */
@media(max-width: 768px) {
    .auth-wrapper {
        grid-template-columns: 1fr;
    }
}

</style>
</head>

<body>

<div class="auth-wrapper">

    <!-- LEFT SIDE -->
    <div class="auth-left">
        <img src="{% static 'accounts/images/logo.jpg' %}" alt="logo">
        <h1>EduVision</h1>
        <p>Welcome Back 👋</p>
    </div>

    <!-- RIGHT SIDE -->
    <div class="auth-right">

        <h2>Login to your account</h2>

        <!-- ⭐ DJANGO FORM (UNCHANGED BACKEND) -->
        <form method="POST">
            {% csrf_token %}

            <div class="input-group">
                <input type="email" name="email" placeholder="Enter Email" required>
            </div>

            <div class="input-group">
                <input type="password" name="password" placeholder="Password" required>
            </div>

            <button type="submit">Login</button>

            {% if error %}
                <div class="error-msg">{{ error }}</div>
            {% endif %}
        </form>

        <div class="footer">
         EduVision © 2026
        </div>

    </div>

</div>

</body>
</html>
