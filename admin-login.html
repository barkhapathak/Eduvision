<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login | EduVision</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="login-body">

<div class="login-wrapper">

    <div class="login-image">
        <img src="eduimg.jpeg" alt="EduVision">
        <h3>EduVision</h3>
        <p>Admin Panel</p>
    </div>

    <div class="login-box">
        <h2>Admin Login</h2>

        <input type="email" placeholder=" Email">
        <input type="password" placeholder="Password">

        <div class="forgot-password">
            <a href="#">Forgot Password?</a>
        </div>

        <button>Login</button>
        <p>    EduVision Admin Panel</p>
    </div>

</div>

</body>
</html>
